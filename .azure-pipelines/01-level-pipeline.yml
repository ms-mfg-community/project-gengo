# Azure DevOps Pipeline: 01-level-pipeline
name: 01-level-pipeline

# Trigger the pipeline manually from the main branch
trigger: none

# Allow manual trigger
pr: none

# Define variables
variables:
  vmImage: 'ubuntu-latest'

stages:
- stage: ListRepositoryContents
  displayName: 'List Repository Contents'
  jobs:
  - job: ListContents
    displayName: 'List Repository Contents Job'
    pool:
      vmImage: $(vmImage)
    
    steps:
    # Display the event and branch name
    - task: PowerShell@2
      displayName: 'Display Pipeline and Branch Information'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "🚀 Pipeline Event: Manual Trigger"
          Write-Host "🌿 Branch: $(Build.SourceBranchName)"
          Write-Host "📦 Repository: $(Build.Repository.Name)"
          Write-Host "👤 Requested by: $(Build.RequestedFor)"
          Write-Host "🔗 Build ID: $(Build.BuildId)"
          Write-Host "🔢 Build Number: $(Build.BuildNumber)"
    
    # Check out the repository (automatic in Azure DevOps)
    - checkout: self
      displayName: 'Checkout Repository'
      fetchDepth: 0
    
    # Create artifacts directory
    - task: Bash@3
      displayName: 'Create Artifacts Directory'
      inputs:
        targetType: 'inline'
        script: |
          mkdir -p artifacts
          echo "📁 Created artifacts directory"
    
    # PowerShell script to list repository contents
    - task: PowerShell@2
      displayName: 'List Repository Contents with PowerShell'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "🔍 Starting PowerShell directory listing..."
          
          # Function to recursively list directory contents
          function Get-DirectoryContents {
              param([string]$Path, [string]$OutputFile)
              
              $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC"
              
              # Write header information
              "Repository Directory Contents (PowerShell)" | Out-File -FilePath $OutputFile -Encoding UTF8
              "Generated on: $timestamp" | Out-File -FilePath $OutputFile -Append -Encoding UTF8
              "Root path: $Path" | Out-File -FilePath $OutputFile -Append -Encoding UTF8
              "=" * 80 | Out-File -FilePath $OutputFile -Append -Encoding UTF8
              "" | Out-File -FilePath $OutputFile -Append -Encoding UTF8
              
              Get-ChildItem -Path $Path -Recurse -Force | 
                  Where-Object { $_.FullName -notlike "*/.git/*" -and $_.Name -ne ".git" } |
                  Sort-Object FullName |
                  ForEach-Object {
                      $relativePath = $_.FullName.Replace($Path, "").TrimStart("/", "\")
                      if ($_.PSIsContainer) {
                          "[DIR]  $relativePath/" | Out-File -FilePath $OutputFile -Append -Encoding UTF8
                      } else {
                          $size = if ($_.Length) { $_.Length } else { 0 }
                          "[FILE] $relativePath ($size bytes)" | Out-File -FilePath $OutputFile -Append -Encoding UTF8
                      }
                  }
          }
          
          # List repository contents and save to artifacts
          $outputFile = "artifacts/powershell-directory-contents.txt"
          Get-DirectoryContents -Path $PWD -OutputFile $outputFile
          
          Write-Host "✅ PowerShell directory listing completed"
          Write-Host "📄 Output saved to: $outputFile"
    
    # Run Python script to list repository contents
    - task: PythonScript@0
      displayName: 'List Repository Contents with Python'
      inputs:
        scriptSource: 'filePath'
        scriptPath: '.github/workflows/src/getDirectoryContents.py'
    
    # Display artifact information
    - task: Bash@3
      displayName: 'Display Artifact Summary'
      inputs:
        targetType: 'inline'
        script: |
          echo "📦 Artifacts created:"
          ls -la artifacts/
          echo ""
          echo "🔢 File sizes:"
          du -h artifacts/*
    
    # Upload both outputs as build artifacts
    - task: PublishBuildArtifacts@1
      displayName: 'Upload Directory Contents Artifacts'
      inputs:
        pathToPublish: 'artifacts/'
        artifactName: 'repository-contents'
        publishLocation: 'Container'

- stage: RetrieveMetadataAndArtifacts
  displayName: 'Retrieve Metadata and Download Artifacts'
  dependsOn: ListRepositoryContents
  jobs:
  - job: RetrieveMetadata
    displayName: 'Retrieve Metadata and Download Artifacts Job'
    pool:
      vmImage: $(vmImage)
    
    steps:
    # Display pipeline metadata
    - task: PowerShell@2
      displayName: 'Display Pipeline Metadata'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "📊 PIPELINE METADATA"
          Write-Host "===================="
          Write-Host "🌿 Branch: $(Build.SourceBranchName)"
          Write-Host "🔗 Job Name: $(Agent.JobName)"
          Write-Host "🏃 Build ID: $(Build.BuildId)"
          Write-Host "🔢 Build Number: $(Build.BuildNumber)"
          Write-Host "📅 Build Started: $(Build.StartTime)"
          Write-Host "👤 Requested by: $(Build.RequestedFor)"
          Write-Host "📦 Repository: $(Build.Repository.Name)"
          Write-Host "🔧 Reason: $(Build.Reason)"
          Write-Host "💻 Agent OS: $(Agent.OS)"
          Write-Host "🏗️ Agent Name: $(Agent.Name)"
    
    # Create downloads folder if needed
    - task: Bash@3
      displayName: 'Create Downloads Directory'
      inputs:
        targetType: 'inline'
        script: |
          mkdir -p downloads
          echo "📁 Created downloads directory"
          ls -la
    
    # Download the previously uploaded artifact
    - task: DownloadBuildArtifacts@1
      displayName: 'Download Repository Contents Artifact'
      inputs:
        buildType: 'current'
        artifactName: 'repository-contents'
        downloadPath: 'downloads/'
    
    # Display downloaded artifact contents using PowerShell
    - task: PowerShell@2
      displayName: 'Display Downloaded Artifact Contents'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "📥 DOWNLOADED ARTIFACT CONTENTS"
          Write-Host "==============================="
          
          # List files in downloads directory
          Write-Host "📁 Files in downloads directory:"
          Get-ChildItem -Path "downloads/" -Recurse | ForEach-Object {
              $size = if ($_.PSIsContainer) { "[DIR]" } else { "$($_.Length) bytes" }
              Write-Host "  $($_.Name) - $size"
          }
          
          Write-Host ""
          Write-Host "📄 PowerShell Output Contents:"
          Write-Host "------------------------------"
          $powershellFile = "downloads/repository-contents/powershell-directory-contents.txt"
          if (Test-Path $powershellFile) {
              Get-Content $powershellFile | Select-Object -First 20
              $lineCount = (Get-Content $powershellFile).Count
              Write-Host "... (showing first 20 lines of $lineCount total lines)"
          } else {
              Write-Host "❌ PowerShell output file not found"
          }
          
          Write-Host ""
          Write-Host "🐍 Python Output Contents:"
          Write-Host "---------------------------"
          $pythonFile = "downloads/repository-contents/python-directory-contents.txt"
          if (Test-Path $pythonFile) {
              Get-Content $pythonFile | Select-Object -First 20  
              $lineCount = (Get-Content $pythonFile).Count
              Write-Host "... (showing first 20 lines of $lineCount total lines)"
          } else {
              Write-Host "❌ Python output file not found"
          }
          
          Write-Host ""
          Write-Host "✅ Artifact download and display completed successfully!"
