trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - .github/*

pr:
  branches:
    include:
      - main

schedules:
  - cron: "0 0 * * *"
    displayName: Daily midnight UTC
    branches:
      include:
        - main
    always: false

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: ListContents
    displayName: 'List Repository Contents'
    jobs:
      - job: list_contents
        displayName: 'List Repository Contents'
        steps:
          - task: PowerShell@2
            displayName: 'Display Pipeline Trigger Information'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "========================================" -ForegroundColor Cyan
                Write-Host "Pipeline Trigger Information" -ForegroundColor Cyan
                Write-Host "========================================" -ForegroundColor Cyan
                Write-Host "Event Name: $(Build.Reason)" -ForegroundColor Yellow
                Write-Host "Branch: $(Build.SourceBranchName)" -ForegroundColor Yellow
                Write-Host "Repository: $(Build.Repository.Name)" -ForegroundColor Yellow
                Write-Host "Requested For: $(Build.RequestedFor)" -ForegroundColor Yellow
                Write-Host "========================================" -ForegroundColor Cyan

          - checkout: self
            displayName: 'Checkout Repository'

          - task: Bash@3
            displayName: 'List Repository Contents with Tree'
            continueOnError: true
            inputs:
              targetType: 'inline'
              script: |
                echo "========================================" 
                echo "Repository Contents (Tree View - Depth 3)"
                echo "========================================"
                tree -L 3 -h --du

          - task: PowerShell@2
            displayName: 'List Source Directory Contents with PowerShell'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "`n========================================" -ForegroundColor Cyan
                Write-Host "Source Directory Contents (PowerShell)" -ForegroundColor Cyan
                Write-Host "========================================" -ForegroundColor Cyan
                
                $srcPath = "src"
                
                if (Test-Path -Path $srcPath) {
                    function Get-DirectoryTree {
                        param(
                            [string]$Path,
                            [int]$Depth = 0,
                            [int]$MaxDepth = 5
                        )
                        
                        if ($Depth -gt $MaxDepth) { return }
                        
                        $indent = "  " * $Depth
                        $items = Get-ChildItem -Path $Path -ErrorAction SilentlyContinue | Sort-Object -Property @{Expression={$_.PSIsContainer}; Descending=$true}, Name
                        
                        foreach ($item in $items) {
                            if ($item.PSIsContainer) {
                                Write-Host "$indent📁 $($item.Name)/" -ForegroundColor Yellow
                                Get-DirectoryTree -Path $item.FullName -Depth ($Depth + 1) -MaxDepth $MaxDepth
                            } else {
                                $sizeKB = [math]::Round($item.Length / 1KB, 2)
                                Write-Host "$indent📄 $($item.Name) ($($sizeKB) KB)" -ForegroundColor Green
                            }
                        }
                    }
                    
                    Get-DirectoryTree -Path $srcPath
                } else {
                    Write-Host "Source directory ($srcPath) does not exist." -ForegroundColor Red
                }
                
                Write-Host "========================================" -ForegroundColor Cyan

  - stage: RetrieveValues
    displayName: 'Retrieve and Display Metadata'
    dependsOn: ListContents
    jobs:
      - job: retrieve_values
        displayName: 'Retrieve and Display Workflow Metadata'
        steps:
          - task: PowerShell@2
            displayName: 'Display Branch and Metadata Information'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "========================================" -ForegroundColor Cyan
                Write-Host "Pipeline Metadata and Branch Information" -ForegroundColor Cyan
                Write-Host "========================================" -ForegroundColor Cyan
                Write-Host "Branch Name: $(Build.SourceBranchName)" -ForegroundColor Yellow
                Write-Host "Full Ref: $(Build.SourceBranch)" -ForegroundColor Yellow
                Write-Host "Repository Default Branch: $(System.DefaultBranch)" -ForegroundColor Yellow
                Write-Host "Build ID: $(Build.BuildId)" -ForegroundColor Yellow
                Write-Host "Build Number: $(Build.BuildNumber)" -ForegroundColor Yellow
                Write-Host "Source Version (Commit): $(Build.SourceVersion)" -ForegroundColor Yellow
                Write-Host "Requested For: $(Build.RequestedFor)" -ForegroundColor Yellow
                Write-Host "Build Reason: $(Build.Reason)" -ForegroundColor Yellow
                Write-Host "========================================" -ForegroundColor Cyan
