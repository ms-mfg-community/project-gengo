name: 01 Level Pipeline - Repository Content Listing and Artifact Management

# Trigger the pipeline manually from the main branch
trigger: none

# Manual trigger for Azure DevOps
resources:
  repositories:
  - repository: self
    type: git
    ref: refs/heads/main

# Pipeline variables
variables:
  vmImage: 'ubuntu-latest'

# Pipeline stages
stages:
- stage: ListContentsAndArtifacts
  displayName: 'List Contents and Create Artifacts'
  jobs:
  - job: ListContentsAndArtifacts
    displayName: 'List Repository Contents and Create Artifacts'
    pool:
      vmImage: $(vmImage)
    
    steps:
    # Display the event and branch name
    - task: PowerShell@2
      displayName: 'Display Event and Branch Information'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "🚀 Pipeline triggered manually"
          Write-Host "📂 Branch: $(Build.SourceBranchName)"
          Write-Host "🔧 Repository: $(Build.Repository.Name)"
          Write-Host "👤 Requested By: $(Build.RequestedFor)"
          Write-Host "🔢 Build Number: $(Build.BuildNumber)"
          Write-Host "🆔 Build ID: $(Build.BuildId)"

    # Check out the repository (automatic in Azure DevOps)
    - checkout: self
      displayName: 'Checkout Repository'

    # PowerShell script to list all repository contents and save to artifacts folder
    - task: PowerShell@2
      displayName: 'List Repository Contents with PowerShell'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "📋 Listing repository contents with PowerShell..."
          
          # Create artifacts directory
          New-Item -ItemType Directory -Path "artifacts" -Force | Out-Null
          
          # Get repository contents recursively
          $output = @()
          $output += "Repository Contents - Generated by PowerShell"
          $output += "=" * 50
          $output += "Repository: $(Build.Repository.Name)"
          $output += "Branch: $(Build.SourceBranchName)"
          $output += "Build Number: $(Build.BuildNumber)"
          $output += "Timestamp: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')"
          $output += ""
          
          # Function to get directory tree
          function Get-DirectoryTree {
              param($Path, $Indent = 0)
              
              $items = Get-ChildItem -Path $Path | Sort-Object Name
              foreach ($item in $items) {
                  $prefix = "  " * $Indent
                  if ($item.PSIsContainer) {
                      $output += "$prefix📁 $($item.Name)/"
                      Get-DirectoryTree -Path $item.FullName -Indent ($Indent + 1)
                  } else {
                      $size = if ($item.Length -lt 1KB) { "$($item.Length) B" } 
                             elseif ($item.Length -lt 1MB) { "{0:N1} KB" -f ($item.Length / 1KB) }
                             else { "{0:N1} MB" -f ($item.Length / 1MB) }
                      $output += "$prefix📄 $($item.Name) ($size)"
                  }
              }
          }
          
          Get-DirectoryTree -Path "."
          
          # Save to file
          $output | Out-File -FilePath "artifacts/repository-contents-powershell.txt" -Encoding UTF8
          Write-Host "✅ PowerShell output saved to artifacts/repository-contents-powershell.txt"

    # Python script to list repository contents
    - task: Bash@3
      displayName: 'List Repository Contents with Python'
      inputs:
        targetType: 'inline'
        script: |
          echo "🐍 Listing repository contents with Python..."
          python .github/workflows/src/getDirectoryContents.py > artifacts/repository-contents-python.txt
          echo "✅ Python output saved to artifacts/repository-contents-python.txt"

    # Upload both outputs as build artifacts
    - task: PublishBuildArtifacts@1
      displayName: 'Upload Repository Contents Artifacts'
      inputs:
        pathToPublish: 'artifacts/'
        artifactName: 'repository-contents'
        publishLocation: 'Container'

- stage: WorkflowMetadataAndDisplay
  displayName: 'Display Metadata and Download Artifacts'
  dependsOn: ListContentsAndArtifacts
  jobs:
  - job: WorkflowMetadataAndDisplay
    displayName: 'Display Pipeline Metadata and Artifact Contents'
    pool:
      vmImage: $(vmImage)
    
    steps:
    # Display pipeline metadata
    - task: PowerShell@2
      displayName: 'Display Pipeline Metadata'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "🔍 Pipeline Metadata:"
          Write-Host "===================="
          Write-Host "Branch: $(Build.SourceBranchName)"
          Write-Host "Job Name: $(Agent.JobName)"
          Write-Host "Build ID: $(Build.BuildId)"
          Write-Host "Build Number: $(Build.BuildNumber)"
          Write-Host "Pipeline Name: $(Build.DefinitionName)"
          Write-Host "Repository: $(Build.Repository.Name)"
          Write-Host "Requested By: $(Build.RequestedFor)"
          Write-Host "Source Version: $(Build.SourceVersion)"
          Write-Host "Agent Name: $(Agent.Name)"
          Write-Host "Agent OS: $(Agent.OS)"

    # Create downloads folder if needed
    - task: Bash@3
      displayName: 'Create Downloads Folder'
      inputs:
        targetType: 'inline'
        script: |
          echo "📁 Creating downloads folder..."
          mkdir -p downloads
          echo "✅ Downloads folder created"

    # Download the previously uploaded artifact
    - task: DownloadBuildArtifacts@1
      displayName: 'Download Repository Contents Artifacts'
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'repository-contents'
        downloadPath: 'downloads/'

    # Display artifact contents using PowerShell
    - task: PowerShell@2
      displayName: 'Display Artifact Contents'
      inputs:
        targetType: 'inline'
        script: |
          Write-Host "📋 Displaying downloaded artifact contents:"
          Write-Host "=" * 50
          
          $artifactPath = "downloads/repository-contents"
          if (Test-Path $artifactPath) {
              $files = Get-ChildItem -Path $artifactPath
              Write-Host "📂 Files in artifact:"
              foreach ($file in $files) {
                  Write-Host "  📄 $($file.Name) - $($file.Length) bytes"
              }
              Write-Host ""
              
              # Display PowerShell output content
              $psFile = "$artifactPath/repository-contents-powershell.txt"
              if (Test-Path $psFile) {
                  Write-Host "🔍 PowerShell Output Content:"
                  Write-Host "-" * 30
                  Get-Content -Path $psFile | Select-Object -First 20
                  Write-Host "... (truncated for display)"
                  Write-Host ""
              }
              
              # Display Python output content  
              $pyFile = "$artifactPath/repository-contents-python.txt"
              if (Test-Path $pyFile) {
                  Write-Host "🔍 Python Output Content:"
                  Write-Host "-" * 30
                  Get-Content -Path $pyFile | Select-Object -First 20
                  Write-Host "... (truncated for display)"
              }
          } else {
              Write-Host "❌ Artifact folder not found"
          }
