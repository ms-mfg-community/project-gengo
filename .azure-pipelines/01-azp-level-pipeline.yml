# Azure DevOps Pipeline
# Converted from GitHub Actions workflow

name: 01-level-pipeline

trigger:
  branches:
    include:
    - main
  paths:
    exclude:
    - '.github/**'

pr:
  branches:
    include:
    - main

schedules:
- cron: '0 0 * * *'
  displayName: Daily midnight build
  branches:
    include:
    - main
  always: true

pool:
  vmImage: 'ubuntu-latest'

jobs:
- job: Build
  displayName: Build Job

  steps:
  - script: |
      echo "Event: $(Build.Reason)"
      echo "Branch: $(Build.SourceBranchName)"
    displayName: 'Print event and branch'

  - checkout: self
    displayName: 'Checkout repository'

  - script: tree
    displayName: 'List repository contents'

  - powershell: Get-ChildItem -Recurse src
    displayName: 'List src directory contents'
    
  - task: PythonScript@0
    displayName: 'Run Python script to show directory contents'
    inputs:
      scriptSource: 'filePath'
      scriptPath: '$(System.DefaultWorkingDirectory)/.azure-pipelines/src/getDirectoryContents.py'
