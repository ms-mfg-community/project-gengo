# Azure DevOps Pipeline for Java Spring Framework with Maven

trigger:
  branches:
    include:
    - main
    - develop

pr:
  branches:
    include:
    - main
    - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  MAVEN_CACHE_FOLDER: $(Pipeline.Workspace)/.m2/repository
  MAVEN_OPTS: '-Dmaven.repo.local=$(MAVEN_CACHE_FOLDER)'

stages:
- stage: Build
  displayName: 'Build Spring Framework Application'
  jobs:
  - job: BuildJob
    displayName: 'Build and Test'
    steps:
    
    - checkout: self
      displayName: 'Checkout repository'
    
    - task: JavaToolInstaller@0
      displayName: 'Set up JDK 17'
      inputs:
        versionSpec: '17'
        jdkArchitectureOption: 'x64'
        jdkSourceOption: 'PreInstalled'
    
    - script: |
        java -version
        echo "JAVA_HOME: $JAVA_HOME"
      displayName: 'Verify Java installation'
    
    - task: Cache@2
      displayName: 'Cache Maven packages'
      inputs:
        key: 'maven | "$(Agent.OS)" | **/pom.xml'
        restoreKeys: |
          maven | "$(Agent.OS)"
          maven
        path: $(MAVEN_CACHE_FOLDER)
    
    - task: Maven@4
      displayName: 'Set up Maven (latest)'
      inputs:
        mavenPomFile: 'pom.xml'
        goals: '--version'
        options: '$(MAVEN_OPTS)'
        publishJUnitResults: false
    
    - script: |
        mvn --version
        echo "Maven installation verified"
      displayName: 'Verify Maven installation'
    
    - task: Maven@4
      displayName: 'Install Spring Framework dependencies'
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'dependency:resolve'
        options: '$(MAVEN_OPTS)'
        publishJUnitResults: false
    
    - task: Maven@4
      displayName: 'Build with Maven'
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean install'
        options: '-DskipTests $(MAVEN_OPTS)'
        publishJUnitResults: false
    
    - task: Maven@4
      displayName: 'Run tests'
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'test'
        options: '$(MAVEN_OPTS)'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        testRunTitle: 'Spring Framework Tests'
    
    - task: Maven@4
      displayName: 'Package application'
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'package'
        options: '$(MAVEN_OPTS)'
        publishJUnitResults: false
    
    - task: CopyFiles@2
      displayName: 'Copy artifacts'
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)/target'
        Contents: '*.jar'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'
    
    - task: PublishBuildArtifacts@1
      displayName: 'Upload build artifacts'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'spring-app-artifacts'
        publishLocation: 'Container'
