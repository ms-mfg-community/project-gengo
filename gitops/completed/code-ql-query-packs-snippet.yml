# The latest version of pack1 is downloaded, and all default queries are run.
# Version 1.2.3 of pack2 is downloaded, and all default queries are run.
# The latest version of pack3 that is compatible with version 3.2.1 is downloaded, and all queries are run.
# Version 4.5.6 of pack4 is downloaded, and only the queries found in path/to/queries are run.
# Ref: https://learn.microsoft.com/en-us/training/modules/code-scanning-with-github-codeql/6-customize-your-scanning-workflow-with-codeql

- uses: github/codeql-action/init@v3
  with:
    # Comma-separated list of packs to download
    packs: scope/pack1,scope/pack2@1.2.3,scope/pack3@~3.2.1,scope/pack4@4.5.6:path/to/queries

- uses: github/codeql-action/init@v3
  with:
    # Comma-separated list of queries / packs / suites to run.
    # This may include paths or a built in suite, for example:
    # security-extended or security-and-quality.
    queries: security-extended # Queries from the default suite, plus lower severity and precision queries
    # queries: security-and-quality Queries from security-extended, plus maintainability and reliability queries
    # Optional. Provide a token to access queries stored in private repositories.
    external-repository-token: ${{ secrets.ACCESS_TOKEN }}

# Combine queries from a workflow file and a custom configuration file
# If you also use a configuration file for custom settings, any additional packs or queries specified in your workflow are used instead of those specified in the configuration file. 
# If you want to run the combined set of additional packs or queries, prefix the value of packs or queries in the workflow with the + symbol.
# In the following example, the + symbol ensures that the specified additional packs and queries are used together with any specified in the referenced configuration file:

- uses: github/codeql-action/init@v3
  with:
    config-file: ./.github/codeql/codeql-config.yml
    queries: +security-and-quality,octo-org/python-qlpack/show_ifs.ql@main
    packs: +scope/pack1,scope/pack2@1.2.3,scope/pack3@4.5.6:path/to/queries

# ./.github/codeql/codeql-config.yml
# packs:
#   # Use the latest version of 'pack1' published by 'scope'
#   - scope/pack1
#   # Use version 1.2.3 of 'pack2'
#   - scope/pack2@1.2.3
#   # Use the latest version of 'pack3' compatible with 3.2.1
#   - scope/pack3@~3.2.1
#   # Use pack4 and restrict it to queries found in the 'path/to/queries' directory
#   - scope/pack4:path/to/queries
#   # Use pack5 and restrict it to the query 'path/to/single/query.ql'
#   - scope/pack5:path/to/single/query.ql
#   # Use pack6 and restrict it to the query suite 'path/to/suite.qls'
#   - scope/pack6:path/to/suite.qls

# packs:
#   # Use these packs for JavaScript and TypeScript analysis
#   javascript:
#     - scope/js-pack1
#     - scope/js-pack2
#   # Use these packs for Java and Kotlin analysis
#   java:
#     - scope/java-pack1
#     - scope/java-pack2@v1.0.0

