name: GHAS Secret Scanning  
on:
  push:
    # only run on pushes to main; if you push only to excluded paths, this job will be skipped
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'vendor/**'
      - 'scripts/legacy/**'

jobs:
  secret-scanning:
    name: Run GHAS Secret Scanning  
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository  
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🛠 Initialize CodeQL for secret scanning  
        uses: github/codeql-action/init@v2
        with:
          # only secret-scanning portion of the security-extended pack
          queries: security-extended
          config-file: .github/codeql-secret-scanning-config.yml

      - name: 🏗 Autobuild (if needed)  
        uses: github/codeql-action/autobuild@v2

      - name: 🔍 Run CodeQL secret scanning  
        uses: github/codeql-action/analyze@v2
        with:
          # tag these results as "secret-scanning" in the GitHub UI
          category: secret-scanning
