name: gaw-iac-azure-deployment

# Manual trigger with comprehensive input parameters
on:
  workflow_dispatch:
    inputs:
      location:
        description: 'Azure region for resources'
        required: true
        default: 'eastus2'
        type: choice
        options:
          - eastus2
          - westus2
          - centralus
          - eastus
          - westus
      bicepFile:
        description: 'Path to Bicep template file'
        required: true
        default: 'gitops/workspace/infra/main.bicep'
        type: string
      bicepParametersFile:
        description: 'Path to Bicep parameters file'
        required: true
        default: 'gitops/workspace/infra/main.bicepparam'
        type: string
      workflowMode:
        description: 'Workflow execution mode'
        required: true
        default: 'plan-only'
        type: choice
        options:
          - plan-only
          - plan-and-deploy
      stackAction:
        description: 'Deployment stack action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
      deploymentStackPrefix:
        description: 'Deployment stack prefix'
        required: true
        default: 'stack'
        type: string

# Set permissions for OIDC token
permissions:
  id-token: write
  contents: read

# Environment variables (Secrets need to be configured in GitHub repository settings)
env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  rgprefix: 'rgp'
  storagePrefix: '1sta'
  containerRegistryPrefix: 'acr'
  appServicePlanPrefix: 'asp'
  appServicePrefix: 'app'
  keyVaultPrefix: 'kvt'
  lawPrefix: 'law'
  appInsightsPrefix: 'ais'

jobs:
  plan:
    name: Plan Deployment
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      id-token: write
      contents: read

    outputs:
      rndSuffix: ${{ steps.rnd.outputs.rndSuffix }}
    steps:
      - name: Set Output Variables
        id: rnd
        run: |
          echo "rndSuffix=$(echo $RANDOM | md5sum | head -c 8)" >> $GITHUB_OUTPUT

      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Azure Login with OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Set up Azure CLI with Bicep Extension
        run: |
          echo "Setting up Azure CLI and Bicep extension..."
          az upgrade --yes
          # Install and setup Bicep extension
          az bicep install
          
          # Verify installation  
          echo "Azure CLI version:"
          az --version
          echo "Bicep version:"
          az bicep version
      - name: Validate Bicep Files
        run: |
          pwsh -File ./gitops/workspace/infra/scripts/validate-bicep.ps1

      - name: What-If Deployment Analysis
        run: |
          echo "Running what-if analysis for subscription-scoped deployment..."
          
          az deployment sub what-if \
            --name "gaw-deployment-${{ steps.rnd.outputs.randomResourceSuffix }}" \
            --location "${{ github.event.inputs.location }}" \
            --template-file "${{ github.event.inputs.bicepFile }}" \
            --parameters resourceGroupName="${{ env.rgprefix }}-${{ steps.rnd.outputs.rndSuffix }}" \
                         location="${{ github.event.inputs.location }}" \
                         storageAccountName="${{ env.storagePrefix }}${{ steps.rnd.outputs.rndSuffix }}" \
                         containerRegistryName="${{ env.containerRegistryPrefix }}${{ steps.rnd.outputs.rndSuffix }}" \
                         appServicePlanName="${{ env.appServicePlanPrefix }}-${{ steps.rnd.outputs.rndSuffix }}" \
                         appServiceName="${{ env.appServicePrefix }}-${{ steps.rnd.outputs.rndSuffix }}" \
                         appInsightsName="${{ env.appInsightsPrefix }}-${{ steps.rnd.outputs.rndSuffix }}" \
                         keyVaultName="${{ env.keyVaultPrefix }}-${{ steps.rnd.outputs.rndSuffix }}" \
                         lawName="${{ env.lawPrefix }}-${{ steps.rnd.outputs.rndSuffix }}" \
      - name: Display Plan Summary
        run: |
          echo "Planning completed successfully. Review the what-if output above to understand the changes that will be made."
          echo "Planned resources:"
          echo "  - Resource group: ${{ env.rgprefix }}-${{ steps.rnd.outputs.rndSuffix }}"
          echo "  - Storage account: ${{ env.storagePrefix }}${{ steps.rnd.outputs.rndSuffix }}"
          echo "  - Container registry: ${{ env.containerRegistryPrefix }}-${{ steps.rnd.outputs.rndSuffix }}"
          echo "  - App Service Plan: ${{env.appServicePlanPrefix}}-${{ steps.rnd.outputs.rndSuffix }}"
          echo "  - App Service: ${{env.appServicePrefix}}-${{ steps.rnd.outputs.rndSuffix }}"
          echo "  - Application Insights: ${{env.appInsightsPrefix}}-${{ steps.rnd.outputs.rndSuffix }}"
          echo "  - Key Vault: ${{env.keyVaultPrefix}}-${{ steps.rnd.outputs.rndSuffix }}"
          echo "  - Log Analytics Workspace: ${{env.lawPrefix}}-${{ steps.rnd.outputs.rndSuffix }}"
          echo "Use the 'Deploy' job to apply these changes if everything looks good."
  deploy:
    name: Deploy Resources
    runs-on: ubuntu-latest
    environment: prd
    needs: [plan]
    if: ${{ success() && (github.event.inputs.workflowMode == 'plan-and-deploy') }}

    permissions:
      id-token: write
      contents: read
    
    env:
      deployRndSuffix: ${{ needs.plan.outputs.rndSuffix }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Azure Login with OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Set up Azure CLI with Bicep Extension
        run: |
          echo "Setting up Azure CLI and Bicep extension..."
          # Install Bicep extension if not already present
          az bicep install
          
          # Verify installation  
          echo "Azure CLI version:"
          az --version
          echo "Bicep version:"
          az bicep version
      
      - name: Validate Bicep Files
        run: |
          pwsh -File ./gitops/workspace/infra/scripts/validate-bicep.ps1

      - name: Deploy Resources (Deploy Action)
        if: ${{ github.event.inputs.stackAction == 'deploy' }}
        run: |
          echo "Deploying resources to Azure..."
          
            # Deploy using Azure Deployment Stacks (preview)
            echo "Deploying resources using Azure Deployment Stacks..."

            az stack sub create \
            --name "${{ github.event.inputs.deploymentStackPrefix }}-${{ env.deployRndSuffix }}" \
            --location "${{ github.event.inputs.location }}" \
            --template-file "${{ github.event.inputs.bicepFile }}" \
            --parameters resourceGroupName="${{ env.rgprefix }}-${{ env.deployRndSuffix }}" \
                   location="${{ github.event.inputs.location }}" \
                   storageAccountName="${{ env.storagePrefix }}${{ env.deployRndSuffix }}" \
                   containerRegistryName="${{ env.containerRegistryPrefix }}${{ env.deployRndSuffix }}" \
                   appServicePlanName="${{ env.appServicePlanPrefix }}-${{ env.deployRndSuffix }}" \
                   appInsightsName="${{ env.appInsightsPrefix }}-${{ env.deployRndSuffix }}" \
                   appServiceName="${{ env.appServicePrefix }}-${{ env.deployRndSuffix }}" \
                   keyVaultName="${{ env.keyVaultPrefix }}-${{ env.deployRndSuffix }}" \
                   lawName="${{ env.lawPrefix }}-${{ env.deployRndSuffix }}" \
            --deny-settings-mode none \
            --action-on-unmanage deleteAll \
            --yes

            echo "Deployment Stack operation completed."

      - name: Cleanup Application Insights Resource
        if: ${{ github.event.inputs.stackAction == 'deploy' || github.event.inputs.stackAction == 'plan-and-deploy' }}
        run: |
          echo "Searching for Application Insights resource to cleanup..."
          
          # Get the App Service resource and check its tags
          APP_SERVICE_NAME="${{ env.appServicePrefix }}-${{ env.deployRndSuffix }}"
          RESOURCE_GROUP="${{ env.rgprefix }}-${{ env.deployRndSuffix }}"
          
          echo "Looking for App Service: $APP_SERVICE_NAME in Resource Group: $RESOURCE_GROUP"
          
          # Get App Service tags
          APP_SERVICE_TAGS=$(az webapp show \
            --name "$APP_SERVICE_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "tags" \
            --output json 2>/dev/null || echo "{}")
          
          echo "App Service tags: $APP_SERVICE_TAGS"
          
          # Search for appInsightsName + '-insights' in tags
          TARGET_INSIGHTS_NAME="${{ env.appInsightsPrefix }}-${{ env.deployRndSuffix }}-insights"
          echo "Searching for Application Insights resource: $TARGET_INSIGHTS_NAME"
          
          # Check if the target insights name exists in any of the tag values
          INSIGHTS_FOUND=$(echo "$APP_SERVICE_TAGS" | jq -r --arg target "$TARGET_INSIGHTS_NAME" 'to_entries[] | select(.value == $target) | .key' 2>/dev/null || echo "")
          
          if [ -n "$INSIGHTS_FOUND" ]; then
            echo "Found Application Insights reference in App Service tags: $INSIGHTS_FOUND = $TARGET_INSIGHTS_NAME"
            
            # Search for the Application Insights resource
            INSIGHTS_RESOURCE_ID=$(az resource list \
              --resource-group "$RESOURCE_GROUP" \
              --resource-type "Microsoft.Insights/components" \
              --query "[?name=='$TARGET_INSIGHTS_NAME'].id" \
              --output tsv 2>/dev/null || echo "")
            
            if [ -n "$INSIGHTS_RESOURCE_ID" ]; then
              echo "Found Application Insights resource: $INSIGHTS_RESOURCE_ID"
              echo "Deleting Application Insights resource: $TARGET_INSIGHTS_NAME"
              
              az resource delete \
                --ids "$INSIGHTS_RESOURCE_ID" \
                --verbose
              
              echo "Application Insights resource deleted successfully."
              
              # Remove ONLY the specific tag from App Service that referenced the deleted Application Insights resource
              # This preserves all other tags, including tags for correct Application Insights resources
              echo "Removing ONLY the specific tag '$INSIGHTS_FOUND' from App Service: $APP_SERVICE_NAME"
              echo "All other tags will be preserved."
              
              # Get current tags before removal for verification
              CURRENT_TAGS=$(az webapp show \
                --name "$APP_SERVICE_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --query "tags" \
                --output json 2>/dev/null || echo "{}")
              echo "Current tags before removal: $CURRENT_TAGS"
              
              # Method 1: Try removing via appsettings (for app settings-based references)
              APP_SETTINGS_RESULT=$(az webapp config appsettings delete \
                --name "$APP_SERVICE_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --setting-names "$INSIGHTS_FOUND" \
                --output json 2>/dev/null || echo "null")
              
              if [ "$APP_SETTINGS_RESULT" != "null" ]; then
                echo "Successfully removed app setting '$INSIGHTS_FOUND'"
              else
                echo "Tag '$INSIGHTS_FOUND' not found in app settings, trying direct tag removal..."
                
                # Method 2: Remove the specific tag directly using resource update
                # This only removes the specific tag while preserving all others
                TAG_REMOVAL_RESULT=$(az resource update \
                  --resource-group "$RESOURCE_GROUP" \
                  --name "$APP_SERVICE_NAME" \
                  --resource-type "Microsoft.Web/sites" \
                  --remove tags."$INSIGHTS_FOUND" \
                  --output json 2>/dev/null || echo "null")
                
                if [ "$TAG_REMOVAL_RESULT" != "null" ]; then
                  echo "Successfully removed tag '$INSIGHTS_FOUND' from resource tags"
                else
                  echo "Tag '$INSIGHTS_FOUND' not found in resource tags or removal failed"
                fi
              fi
              
              # Verify tags after removal to confirm only the specific tag was removed
              UPDATED_TAGS=$(az webapp show \
                --name "$APP_SERVICE_NAME" \
                --resource-group "$RESOURCE_GROUP" \
                --query "tags" \
                --output json 2>/dev/null || echo "{}")
              echo "Tags after selective removal: $UPDATED_TAGS"
              
              # Verify the specific tag was removed while others remain
              TAG_STILL_EXISTS=$(echo "$UPDATED_TAGS" | jq -r --arg target "$TARGET_INSIGHTS_NAME" 'to_entries[] | select(.value == $target) | .key' 2>/dev/null || echo "")
              if [ -z "$TAG_STILL_EXISTS" ]; then
                echo "✓ Confirmed: Tag referencing '$TARGET_INSIGHTS_NAME' has been successfully removed"
                echo "✓ All other tags have been preserved"
              else
                echo "⚠ Warning: Tag referencing '$TARGET_INSIGHTS_NAME' may still exist"
              fi
              
              echo "Selective tag cleanup completed."
            else
              echo "Application Insights resource '$TARGET_INSIGHTS_NAME' not found in resource group."
            fi
          else
            echo "No Application Insights reference found in App Service tags matching: $TARGET_INSIGHTS_NAME"
          fi

      - name: Rollback Resources (Rollback Action)
        if: ${{ github.event.inputs.stackAction == 'rollback' }}
        run: |
          echo "Rolling back deployment..."
          # Rollback using Azure Deployment Stacks (preview)
            # Get the most recent deployment stack
            RECENT_STACK=$(az stack sub list \
            --query "[?contains(name, '${{ github.event.inputs.deploymentStackPrefix }}')].{name:name, timestamp:systemData.createdAt} | sort_by(@, &timestamp) | [-1].name" \
            --output tsv)
            
            if [ -z "$RECENT_STACK" ]; then
            echo "No deployment stacks found with prefix '${{ github.event.inputs.deploymentStackPrefix }}'"
            exit 1
            fi
            
            echo "Most recent deployment stack found: $RECENT_STACK"
            echo "Rolling back deployment stack: $RECENT_STACK"
            
          az stack sub delete \
            --name $RECENT_STACK \
            --yes \
            --no-wait \
            --verbose
          
          # List recent deployments for reference
          echo "Recent deployments:"
          az deployment sub list --query "[?contains(name, '${{ github.event.inputs.deploymentStackPrefix }}')].{Name:name, State:properties.provisioningState, Timestamp:properties.timestamp}" --output table

      - name: Display Deployment Results
        run: |
          echo "Deployment operation completed."
          
          if [ "${{ github.event.inputs.stackAction }}" == "deploy" ]; then
            echo "Deployed resources:"
            echo "  - Resource group: ${{ env.rgprefix }}-${{ env.deployRndSuffix }}"
            echo "  - Storage account: ${{ env.storagePrefix }}${{ env.deployRndSuffix }}"
            echo "  - Container registry: ${{ env.containerRegistryPrefix }}-${{ env.deployRndSuffix }}"
            echo "  - App Service Plan: ${{ env.appServicePlanPrefix }}-${{ env.deployRndSuffix }}"
            echo "  - App Service: ${{ env.appServicePrefix }}-${{ env.deployRndSuffix }}"
            echo "  - Application Insights: ${{ env.appInsightsPrefix }}-${{ env.deployRndSuffix }}"
            echo "  - Key Vault: ${{ env.keyVaultPrefix }}-${{ env.deployRndSuffix }}"
            echo "  - Log Analytics Workspace: ${{ env.lawPrefix }}-${{ env.deployRndSuffix }}"
            echo "Deployment completed successfully. Review the output above for details."
            echo "You can also check the Azure portal for more details."
            echo "Listing deployed resources:"
            az resource list --resource-group "${{ env.rgprefix }}-${{ env.deployRndSuffix }}" --output table || echo "Resource group not found or no resources deployed."
          else
            echo "Rollback information displayed above."
          fi