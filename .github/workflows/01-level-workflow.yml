name: 01-Level-Workflow

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  list-contents:
    name: List Repository Contents
    runs-on: ubuntu-latest
    steps:
      - name: Display Workflow Trigger Information
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Workflow Trigger Information" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Event Name: ${{ github.event_name }}" -ForegroundColor Yellow
          Write-Host "Branch: ${{ github.ref_name }}" -ForegroundColor Yellow
          Write-Host "Repository: ${{ github.repository }}" -ForegroundColor Yellow
          Write-Host "Actor: ${{ github.actor }}" -ForegroundColor Yellow
          Write-Host "========================================" -ForegroundColor Cyan
        shell: pwsh

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: List Repository Contents with Tree
        run: |
          Write-Host "`n========================================" -ForegroundColor Cyan
          Write-Host "Repository Contents (Tree View - Depth 3)" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          tree -L 3 -h --du
        shell: bash
        continue-on-error: true

      - name: List Source Directory Contents with PowerShell
        run: |
          Write-Host "`n========================================" -ForegroundColor Cyan
          Write-Host "Source Directory Contents (PowerShell)" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          
          $srcPath = "src"
          
          if (Test-Path -Path $srcPath) {
              function Get-DirectoryTree {
                  param(
                      [string]$Path,
                      [int]$Depth = 0,
                      [int]$MaxDepth = 5
                  )
                  
                  if ($Depth -gt $MaxDepth) { return }
                  
                  $indent = "  " * $Depth
                  $items = Get-ChildItem -Path $Path -ErrorAction SilentlyContinue | Sort-Object -Property @{Expression={$_.PSIsContainer}; Descending=$true}, Name
                  
                  foreach ($item in $items) {
                      if ($item.PSIsContainer) {
                          Write-Host "$indent📁 $($item.Name)/" -ForegroundColor Yellow
                          Get-DirectoryTree -Path $item.FullName -Depth ($Depth + 1) -MaxDepth $MaxDepth
                      } else {
                          $sizeKB = [math]::Round($item.Length / 1KB, 2)
                          Write-Host "$indent📄 $($item.Name) ($($sizeKB) KB)" -ForegroundColor Green
                      }
                  }
              }
              
              Get-DirectoryTree -Path $srcPath
          } else {
              Write-Host "Source directory ($srcPath) does not exist." -ForegroundColor Red
          }
          
          Write-Host "========================================" -ForegroundColor Cyan
        shell: pwsh

  retrieve-values:
    name: Retrieve and Display Workflow Metadata
    runs-on: ubuntu-latest
    needs: list-contents
    steps:
      - name: Display Branch Information
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Workflow Metadata and Branch Information" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "Branch Name (ref_name): ${{ github.ref_name }}" -ForegroundColor Yellow
          Write-Host "Full Ref: ${{ github.ref }}" -ForegroundColor Yellow
          Write-Host "Head Ref (PRs only): ${{ github.head_ref || 'N/A' }}" -ForegroundColor Yellow
          Write-Host "Base Ref (PRs only): ${{ github.base_ref || 'N/A' }}" -ForegroundColor Yellow
          Write-Host "Default Branch: ${{ github.event.repository.default_branch }}" -ForegroundColor Yellow
          Write-Host "Job ID: ${{ github.job }}" -ForegroundColor Yellow
          Write-Host "Run ID: ${{ github.run_id }}" -ForegroundColor Yellow
          Write-Host "Run Number: ${{ github.run_number }}" -ForegroundColor Yellow
          Write-Host "========================================" -ForegroundColor Cyan
        shell: pwsh
