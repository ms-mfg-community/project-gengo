name: Java and Spring Framework CI
trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self

- task: UseJavaVersion@1
  inputs:
    versionSpec: '11'

- script: |
    sudo apt-get update
    sudo apt-get install -y maven
  displayName: 'Install Maven'

- script: |
    mvn clean install
  displayName: 'Build and test'

- script: |
    curl https://start.spring.io/starter.zip -o spring-starter.zip
    unzip spring-starter.zip
    cd spring-starter
    ./mvnw clean install
  displayName: 'Set up Spring Framework'

- script: |
    ./mvnw test
  displayName: 'Run tests'
