name: Java and Spring Framework CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Java
      uses: actions/setup-java@v2
      with:
        java-version: '11'

    - name: Install Maven
      run: |
        sudo apt-get update
        sudo apt-get install -y maven

    - name: Build and test
      run: |
        mvn clean install

    - name: Set up Spring Framework
      run: |
        curl https://start.spring.io/starter.zip -o spring-starter.zip
        unzip spring-starter.zip
        cd spring-starter
        ./mvnw clean install

    - name: Run tests
      run: |
        ./mvnw test