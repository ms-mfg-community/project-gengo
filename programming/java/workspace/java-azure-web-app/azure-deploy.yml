name: reliable-webapp

# Configure Azure services that the app uses
resources:
  # Azure App Service for hosting the web application
  - name: app-service
    type: Microsoft.Web/sites
    sku:
      name: P1v3
      tier: Premium
    properties:
      httpsOnly: true
      clientAffinityEnabled: false
      webSocketsEnabled: true
      alwaysOn: true
      ftpsState: "Disabled"

  # Azure Database for PostgreSQL
  - name: postgresql-server
    type: Microsoft.DBforPostgreSQL/servers
    sku:
      name: GP_Gen5_4
      tier: GeneralPurpose
    properties:
      administratorLogin: ${POSTGRES_ADMIN}
      sslEnforcement: "Enabled"
      storageProfile:
        storageMB: 102400
        backupRetentionDays: 7
        geoRedundantBackup: "Enabled"

  # Azure Redis Cache
  - name: redis-cache
    type: Microsoft.Cache/Redis
    sku:
      name: Standard
      family: C
      capacity: 2
    properties:
      enableNonSslPort: false
      minimumTlsVersion: "1.2"
      redisConfiguration:
        maxmemory-policy: "volatile-lru"

  # Azure Key Vault for secrets management
  - name: key-vault
    type: Microsoft.KeyVault/vaults
    properties:
      enabledForDeployment: true
      enabledForTemplateDeployment: true
      enabledForDiskEncryption: true
      tenantId: ${AZURE_TENANT_ID}
      accessPolicies: []
      sku:
        name: "standard"
        family: "A"

  # Application Insights for monitoring
  - name: app-insights
    type: Microsoft.Insights/components
    kind: "web"
    properties:
      Application_Type: "web"
      Flow_Type: "Redfield"
      Request_Source: "IbizaAIExtension"

  # Azure Front Door for WAF and global load balancing
  - name: front-door
    type: Microsoft.Network/frontdoors
    properties:
      routingRules:
        - name: "default"
          frontendEndpoints:
            - "${PROJECT_NAME}.azurefd.net"
          acceptedProtocols:
            - "Https"
          patternsToMatch:
            - "/*"
          routeConfiguration:
            forwardingProtocol: "HttpsOnly"
            backendPool: "app-backend"
      backendPools:
        - name: "app-backend"
          backends:
            - address: "${APP_HOSTNAME}"
              httpPort: 80
              httpsPort: 443
              priority: 1
              weight: 100
      frontendEndpoints:
        - name: "default"
          hostName: "${PROJECT_NAME}.azurefd.net"
          sessionAffinityEnabledState: "Disabled"
          sessionAffinityTtlSeconds: 0
          webApplicationFirewallPolicyLink:
            id: "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP}/providers/Microsoft.Network/frontdoorWebApplicationFirewallPolicies/wafpolicy"

  # Virtual Network for private endpoints
  - name: vnet
    type: Microsoft.Network/virtualNetworks
    properties:
      addressSpace:
        addressPrefixes:
          - "10.0.0.0/16"
      subnets:
        - name: "app-subnet"
          properties:
            addressPrefix: "10.0.0.0/24"
        - name: "private-endpoints"
          properties:
            addressPrefix: "10.0.1.0/24"
            privateEndpointNetworkPolicies: "Disabled"

# Network security settings
networkSecuritySettings:
  allowedSourceIps:
    - "0.0.0.0/0"  # In production, restrict to specific IPs
  privateEndpoints:
    - name: "pg-private-endpoint"
      service: "PostgreSQL"
      subnetId: "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP}/providers/Microsoft.Network/virtualNetworks/${VNET_NAME}/subnets/private-endpoints"
    - name: "redis-private-endpoint"
      service: "RedisCache"
      subnetId: "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP}/providers/Microsoft.Network/virtualNetworks/${VNET_NAME}/subnets/private-endpoints"
    - name: "kv-private-endpoint"
      service: "KeyVault"
      subnetId: "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP}/providers/Microsoft.Network/virtualNetworks/${VNET_NAME}/subnets/private-endpoints"

# Identity and Access Management
identitySettings:
  managedIdentity:
    enabled: true
  rbacAssignments:
    - role: "Key Vault Secrets User"
      scope: "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP}/providers/Microsoft.KeyVault/vaults/${KEY_VAULT_NAME}"
    - role: "Monitoring Metrics Publisher"
      scope: "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RESOURCE_GROUP}/providers/Microsoft.Insights/components/${APP_INSIGHTS_NAME}"

# Application specific settings
appSettings:
  java:
    version: "17"
    webContainer: "Java SE"
  connectionStrings:
    - name: "SPRING_DATASOURCE_URL"
      value: "jdbc:postgresql://${POSTGRESQL_HOST}:5432/${POSTGRESQL_DB}?sslmode=require"
      type: "Custom"
    - name: "SPRING_REDIS_HOST"
      value: "${REDIS_HOST}"
      type: "Custom"
  environmentVariables:
    - name: "AZURE_KEYVAULT_ENABLED"
      value: "true"
    - name: "AZURE_KEYVAULT_URI"
      value: "https://${KEY_VAULT_NAME}.vault.azure.net/"
    - name: "AZURE_APPINSIGHTS_KEY"
      value: "${APP_INSIGHTS_KEY}"
    - name: "AZURE_ENVIRONMENT"
      value: "Production"