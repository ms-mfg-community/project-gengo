# Server configuration
server.port=8080
spring.application.name=azure-reliable-webapp

# Database configuration (Azure SQL/PostgreSQL)
spring.datasource.url=${AZURE_POSTGRESQL_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${AZURE_POSTGRESQL_USERNAME:sa}
spring.datasource.password=${AZURE_POSTGRESQL_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=true

# Azure Redis Cache
spring.cache.type=redis
spring.redis.host=${AZURE_REDIS_HOST:localhost}
spring.redis.port=${AZURE_REDIS_PORT:6379}
spring.redis.password=${AZURE_REDIS_PASSWORD:}
spring.redis.ssl=${AZURE_REDIS_SSL:false}

# Azure Key Vault
azure.keyvault.enabled=${AZURE_KEYVAULT_ENABLED:false}
azure.keyvault.uri=${AZURE_KEYVAULT_URI:}
azure.keyvault.tenant-id=${AZURE_KEYVAULT_TENANT_ID:}
azure.keyvault.client-id=${AZURE_KEYVAULT_CLIENT_ID:}
azure.keyvault.client-key=${AZURE_KEYVAULT_CLIENT_KEY:}

# Azure Active Directory (Microsoft Entra ID)
spring.security.oauth2.client.registration.azure.client-id=${AZURE_CLIENT_ID:}
spring.security.oauth2.client.registration.azure.client-secret=${AZURE_CLIENT_SECRET:}
azure.activedirectory.tenant-id=${AZURE_TENANT_ID:}

# Application Insights
azure.application-insights.instrumentation-key=${AZURE_APPINSIGHTS_KEY:}
management.metrics.export.azure-monitor.enabled=${AZURE_MONITOR_ENABLED:false}

# Actuator endpoints for monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.probes.enabled=true