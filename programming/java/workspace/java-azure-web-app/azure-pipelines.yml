trigger:
  branches:
    include:
      - main
      - develop

variables:
  - group: reliable-webapp-variables
  - name: vmImageName
    value: 'ubuntu-latest'
  - name: javaVersion
    value: '17'
  - name: buildConfiguration
    value: 'Release'

stages:
- stage: Build
  displayName: Build and Test
  jobs:
  - job: BuildJob
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Maven@3
      displayName: Build with Maven
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean package'
        options: '-B -DskipTests'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.$(javaVersion)'
        mavenVersionOption: 'Default'
        mavenOptions: '-Xmx3072m'
        mavenAuthenticateFeed: false
        effectivePomSkip: false
        publishJUnitResults: false

    - task: Maven@3
      displayName: Run Tests
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'test'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.$(javaVersion)'
        mavenVersionOption: 'Default'
        mavenOptions: '-Xmx3072m'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        
    - task: CopyFiles@2
      displayName: Copy JAR to staging directory
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)/target'
        Contents: '*.jar'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'
        
    - task: PublishBuildArtifacts@1
      displayName: Publish build artifacts
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'

- stage: DeployDev
  displayName: Deploy to Development
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployDev
    displayName: Deploy to Dev
    environment: 'development'
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: Deploy to Azure Web App - Dev
            inputs:
              azureSubscription: $(azureSubscription)
              appType: 'webAppLinux'
              appName: '$(appName)-dev'
              package: '$(Pipeline.Workspace)/drop/*.jar'
              runtimeStack: 'JAVA|$(javaVersion)'

- stage: DeployProduction
  displayName: Deploy to Production
  dependsOn: DeployDev
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployProd
    displayName: Deploy to Production
    environment: 'production'
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureResourceManagerTemplateDeployment@3
            displayName: Deploy Azure Infrastructure
            inputs:
              deploymentScope: 'Resource Group'
              azureResourceManagerConnection: '$(azureSubscription)'
              subscriptionId: '$(subscriptionId)'
              action: 'Create Or Update Resource Group'
              resourceGroupName: '$(resourceGroup)'
              location: '$(location)'
              templateLocation: 'Linked artifact'
              csmFile: '$(Pipeline.Workspace)/drop/azure-deploy.yml'
              overrideParameters: '-projectName $(appName)'
              deploymentMode: 'Incremental'
              deploymentOutputs: 'armOutputs'
          
          - task: AzureWebApp@1
            displayName: Deploy to Azure Web App - Production
            inputs:
              azureSubscription: $(azureSubscription)
              appType: 'webAppLinux'
              appName: '$(appName)'
              package: '$(Pipeline.Workspace)/drop/*.jar'
              runtimeStack: 'JAVA|$(javaVersion)'

          - task: AzureAppServiceSettings@1
            displayName: Configure App Settings
            inputs:
              azureSubscription: '$(azureSubscription)'
              appName: '$(appName)'
              resourceGroupName: '$(resourceGroup)'
              appSettings: |
                [
                  {
                    "name": "AZURE_ENVIRONMENT",
                    "value": "Production",
                    "slotSetting": false
                  },
                  {
                    "name": "AZURE_KEYVAULT_ENABLED",
                    "value": "true",
                    "slotSetting": false
                  }
                ]