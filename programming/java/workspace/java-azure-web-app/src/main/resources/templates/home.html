<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Reliable Web App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card {
            height: 100%;
            transition: transform 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Azure Reliable Web App</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/api/products">API</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/actuator/health">Status</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col">
                <h1>Product Catalog</h1>
                <p class="lead">Welcome to our Azure-hosted reliable web application</p>
            </div>
        </div>
        
        <div class="row mb-4">
            <div class="col">
                <form class="d-flex">
                    <input class="form-control me-2" type="search" placeholder="Search products" aria-label="Search">
                    <button class="btn btn-outline-primary" type="submit">Search</button>
                </form>
            </div>
        </div>

        <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col" th:each="product : ${products}">
                <div class="card h-100 product-card">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${product.name}">Product Name</h5>
                        <h6 class="card-subtitle mb-2 text-muted" th:text="${product.category}">Category</h6>
                        <p class="card-text" th:text="${product.description}">Product description</p>
                        <p class="card-text fw-bold" th:text="'$' + ${product.price}">Price</p>
                        <p class="card-text">
                            <span th:if="${product.stockQuantity > 20}" class="badge bg-success">In Stock</span>
                            <span th:if="${product.stockQuantity <= 20 && product.stockQuantity > 5}" class="badge bg-warning">Low Stock</span>
                            <span th:if="${product.stockQuantity <= 5}" class="badge bg-danger">Almost Out</span>
                        </p>
                    </div>
                    <div class="card-footer bg-transparent border-top-0">
                        <a href="#" class="btn btn-sm btn-primary">Details</a>
                        <a href="#" class="btn btn-sm btn-success">Add to Cart</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light mt-5 py-3">
        <div class="container">
            <div class="row">
                <div class="col text-center">
                    <p>&copy; 2025 Azure Reliable Web App Demo | Running on Azure App Service</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
