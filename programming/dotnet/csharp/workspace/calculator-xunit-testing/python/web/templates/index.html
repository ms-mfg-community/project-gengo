<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/calculator.css') }}">
</head>
<body>
    <div class="{{ theme_class }} calculator-container">
        <div class="calculator-wrapper">
            <!-- Header with title and theme toggle -->
            <div class="calculator-header">
                <h1>Calculator</h1>
                <button class="btn-theme-toggle" id="themeToggle" title="Toggle light/dark theme">
                    <span id="themeIcon">{{ theme_icon }}</span>
                </button>
            </div>

            <!-- Main calculator area -->
            <div class="calculator-main">
                <!-- Display -->
                <div class="display-area">
                    <input type="text" class="display" id="display" readonly value="{{ display }}">
                </div>

                <!-- Keypad -->
                <div class="keypad">
                    <!-- Row 0: Clear & Reset buttons -->
                    <button class="btn btn-clear" onclick="handleClear()">
                        <span class="btn-label">C</span>
                        <span class="btn-sublabel">Clear</span>
                    </button>
                    <button class="btn btn-reset" onclick="handleClear()" style="grid-column: span 3;">
                        <span class="btn-label">RESET</span>
                    </button>

                    <!-- Row 1: 7 8 9 / -->
                    <button class="btn btn-number" onclick="handleNumber('7')">7</button>
                    <button class="btn btn-number" onclick="handleNumber('8')">8</button>
                    <button class="btn btn-number" onclick="handleNumber('9')">9</button>
                    <button class="btn btn-operator" onclick="handleOperator('/')" title="Divide">÷</button>

                    <!-- Row 2: 4 5 6 * -->
                    <button class="btn btn-number" onclick="handleNumber('4')">4</button>
                    <button class="btn btn-number" onclick="handleNumber('5')">5</button>
                    <button class="btn btn-number" onclick="handleNumber('6')">6</button>
                    <button class="btn btn-operator" onclick="handleOperator('*')" title="Multiply">×</button>

                    <!-- Row 3: 1 2 3 - -->
                    <button class="btn btn-number" onclick="handleNumber('1')">1</button>
                    <button class="btn btn-number" onclick="handleNumber('2')">2</button>
                    <button class="btn btn-number" onclick="handleNumber('3')">3</button>
                    <button class="btn btn-operator" onclick="handleOperator('-')" title="Subtract">−</button>

                    <!-- Row 4: 0 . + -->
                    <button class="btn btn-number btn-zero" onclick="handleNumber('0')" style="grid-column: span 2;">0</button>
                    <button class="btn btn-number" onclick="handleNumber('.')">.</button>
                    <button class="btn btn-operator" onclick="handleOperator('+')" title="Add">+</button>

                    <!-- Row 5: % x^y = -->
                    <button class="btn btn-operator" onclick="handleOperator('%')" title="Modulo">%</button>
                    <button class="btn btn-operator" onclick="handleOperator('^')" title="Power">x<sup>y</sup></button>
                    <button class="btn btn-equals" onclick="handleEquals()" style="grid-column: span 2;">=</button>
                </div>
            </div>

            <!-- History panel -->
            <div class="history-container">
                <div class="history-panel">
                    <div class="history-header">
                        <h3>History</h3>
                        {% if not history_empty %}
                        <button class="btn-clear-history" onclick="clearHistory()" title="Clear history">✕</button>
                        {% endif %}
                    </div>

                    <div class="history-list" id="historyList">
                        {% if history_empty %}
                        <p class="history-empty">No calculations yet</p>
                        {% else %}
                        {% for calc in history %}
                        <div class="history-item" onclick="replayCalculation({{ loop.index0 }})">
                            <span class="history-text">{{ calc.display_text }}</span>
                        </div>
                        {% endfor %}
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/calculator.js') }}"></script>
</body>
</html>
